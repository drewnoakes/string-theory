name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-wpf:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore StringTheory.slnx
    - name: Build
      run: dotnet build StringTheory.slnx --configuration Release --no-restore
    - name: Publish WPF
      run: dotnet publish StringTheory.Wpf/StringTheory.Wpf.csproj --configuration Release --no-build

  build-avalonia:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore StringTheory.Avalonia/StringTheory.Avalonia.csproj
    - name: Build
      run: dotnet build StringTheory.Avalonia/StringTheory.Avalonia.csproj --configuration Release --no-restore
    - name: Publish
      run: dotnet publish StringTheory.Avalonia/StringTheory.Avalonia.csproj --configuration Release --no-build
