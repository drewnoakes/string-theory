name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:

  build-wpf:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Publish
      run: dotnet publish StringTheory.Wpf/StringTheory.Wpf.csproj --configuration Release --output publish-wpf
    - name: Zip
      run: Compress-Archive -Path publish-wpf/* -DestinationPath string-theory-wpf-win-x64.zip
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload ${{ github.event.release.tag_name }} string-theory-wpf-win-x64.zip

  build-avalonia:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Publish
      run: dotnet publish StringTheory.Avalonia/StringTheory.Avalonia.csproj --configuration Release --runtime ${{ matrix.rid }} --output publish-avalonia
    - name: Zip (Windows)
      if: runner.os == 'Windows'
      run: Compress-Archive -Path publish-avalonia/* -DestinationPath string-theory-avalonia-${{ matrix.rid }}.zip
    - name: Zip (Linux/macOS)
      if: runner.os != 'Windows'
      run: cd publish-avalonia && zip -r ../string-theory-avalonia-${{ matrix.rid }}.zip .
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload ${{ github.event.release.tag_name }} string-theory-avalonia-${{ matrix.rid }}.zip
