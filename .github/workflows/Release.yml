name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:

  build:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Publish
      run: dotnet publish StringTheory/StringTheory.csproj --configuration Release --output publish
    - name: Zip
      run: Compress-Archive -Path publish/* -DestinationPath StringTheory.zip
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload ${{ github.event.release.tag_name }} StringTheory.zip
